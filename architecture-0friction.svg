<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">0friction Architecture Diagram</title>
  <desc id="desc">How 0friction abstracts 0G compute with gasless signatures and USDC settlement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#f4f4f5"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="700" y="70" text-anchor="middle" font-size="42" fill="#f8fafc" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    0friction: AI Compute Without Chain Friction
  </text>
  <text x="700" y="110" text-anchor="middle" font-size="20" fill="#dbeafe" font-family="'Trebuchet MS', Verdana, sans-serif">
    Users sign gasless auth on Base. Solver handles 0G execution and settlement.
  </text>

  <rect x="80" y="180" rx="24" ry="24" width="360" height="520" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.55" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="230" text-anchor="middle" font-size="30" fill="#e0f2fe" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">User App</text>
  <text x="260" y="262" text-anchor="middle" font-size="17" fill="#bfdbfe" font-family="'Trebuchet MS', Verdana, sans-serif">React / Next / Agent runtime</text>

  <rect x="120" y="300" rx="14" ry="14" width="280" height="70" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="260" y="342" text-anchor="middle" font-size="18" fill="#e2e8f0" font-family="'Trebuchet MS', Verdana, sans-serif">1) Request quote</text>

  <rect x="120" y="390" rx="14" ry="14" width="280" height="90" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="260" y="424" text-anchor="middle" font-size="18" fill="#e2e8f0" font-family="'Trebuchet MS', Verdana, sans-serif">2) Sign ComputeIntent</text>
  <text x="260" y="450" text-anchor="middle" font-size="15" fill="#93c5fd" font-family="'Trebuchet MS', Verdana, sans-serif">EIP-712 (gasless)</text>

  <rect x="120" y="500" rx="14" ry="14" width="280" height="90" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="260" y="534" text-anchor="middle" font-size="18" fill="#e2e8f0" font-family="'Trebuchet MS', Verdana, sans-serif">3) Sign USDC Permit</text>
  <text x="260" y="560" text-anchor="middle" font-size="15" fill="#93c5fd" font-family="'Trebuchet MS', Verdana, sans-serif">EIP-2612 (gasless)</text>

  <rect x="80" y="730" rx="18" ry="18" width="360" height="90" fill="#111827" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="260" y="770" text-anchor="middle" font-size="20" fill="#f0f9ff" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">No bridge. No A0GI for users.</text>
  <text x="260" y="796" text-anchor="middle" font-size="14" fill="#bae6fd" font-family="'Trebuchet MS', Verdana, sans-serif">Just signatures + USDC on home chain</text>

  <rect x="520" y="180" rx="24" ry="24" width="360" height="520" fill="url(#card)" stroke="#86efac" stroke-opacity="0.6" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="230" text-anchor="middle" font-size="30" fill="#dcfce7" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">0friction Solver</text>
  <text x="700" y="262" text-anchor="middle" font-size="17" fill="#bbf7d0" font-family="'Trebuchet MS', Verdana, sans-serif">Render backend + queue + verification</text>

  <rect x="560" y="300" rx="14" ry="14" width="280" height="70" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="700" y="342" text-anchor="middle" font-size="18" fill="#e2e8f0" font-family="'Trebuchet MS', Verdana, sans-serif">Verify intent + permit</text>

  <rect x="560" y="390" rx="14" ry="14" width="280" height="70" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="700" y="432" text-anchor="middle" font-size="18" fill="#e2e8f0" font-family="'Trebuchet MS', Verdana, sans-serif">Execute 0G inference</text>

  <rect x="560" y="480" rx="14" ry="14" width="280" height="70" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="700" y="522" text-anchor="middle" font-size="18" fill="#e2e8f0" font-family="'Trebuchet MS', Verdana, sans-serif">Settle USDC (permit + transferFrom)</text>

  <rect x="560" y="570" rx="14" ry="14" width="280" height="70" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="700" y="612" text-anchor="middle" font-size="18" fill="#e2e8f0" font-family="'Trebuchet MS', Verdana, sans-serif">Return output + audit bundle</text>

  <rect x="520" y="730" rx="18" ry="18" width="360" height="90" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="700" y="770" text-anchor="middle" font-size="20" fill="#ecfccb" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">Framework primitive for builders</text>
  <text x="700" y="796" text-anchor="middle" font-size="14" fill="#bbf7d0" font-family="'Trebuchet MS', Verdana, sans-serif">Drop-in SDK + OpenClaw plugin + backend runtime</text>

  <rect x="960" y="180" rx="24" ry="24" width="360" height="520" fill="url(#card)" stroke="#fcd34d" stroke-opacity="0.6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1140" y="230" text-anchor="middle" font-size="30" fill="#fef3c7" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">0G Network</text>
  <text x="1140" y="262" text-anchor="middle" font-size="17" fill="#fde68a" font-family="'Trebuchet MS', Verdana, sans-serif">Compute + Chain primitives</text>

  <rect x="1000" y="300" rx="14" ry="14" width="280" height="85" fill="#3f2f00" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1140" y="336" text-anchor="middle" font-size="18" fill="#f8fafc" font-family="'Trebuchet MS', Verdana, sans-serif">0G Compute providers</text>
  <text x="1140" y="362" text-anchor="middle" font-size="15" fill="#fde68a" font-family="'Trebuchet MS', Verdana, sans-serif">qwen / DeepSeek / GPT-OSS</text>

  <rect x="1000" y="405" rx="14" ry="14" width="280" height="85" fill="#3f2f00" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1140" y="441" text-anchor="middle" font-size="18" fill="#f8fafc" font-family="'Trebuchet MS', Verdana, sans-serif">TEE verification</text>
  <text x="1140" y="467" text-anchor="middle" font-size="15" fill="#fde68a" font-family="'Trebuchet MS', Verdana, sans-serif">processResponse integrity checks</text>

  <rect x="1000" y="510" rx="14" ry="14" width="280" height="85" fill="#3f2f00" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1140" y="546" text-anchor="middle" font-size="18" fill="#f8fafc" font-family="'Trebuchet MS', Verdana, sans-serif">0G Chain contract</text>
  <text x="1140" y="572" text-anchor="middle" font-size="15" fill="#fde68a" font-family="'Trebuchet MS', Verdana, sans-serif">IntentRegistry audit trail</text>

  <rect x="960" y="730" rx="18" ry="18" width="360" height="90" fill="#3f2f00" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1140" y="770" text-anchor="middle" font-size="20" fill="#fffbeb" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700">Powered by 0G Compute</text>
  <text x="1140" y="796" text-anchor="middle" font-size="14" fill="#fde68a" font-family="'Trebuchet MS', Verdana, sans-serif">No protocol changes required for v1 abstraction</text>

  <line x1="440" y1="340" x2="520" y2="340" stroke="#f4f4f5" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="440" y1="430" x2="520" y2="430" stroke="#f4f4f5" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="440" y1="540" x2="520" y2="540" stroke="#f4f4f5" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="880" y1="430" x2="960" y2="430" stroke="#f4f4f5" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="960" y1="540" x2="880" y2="540" stroke="#f4f4f5" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="520" y1="620" x2="440" y2="620" stroke="#f4f4f5" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="700" y="865" text-anchor="middle" font-size="16" fill="#cbd5e1" font-family="'Trebuchet MS', Verdana, sans-serif">
    v1: per-request gasless signatures. vNext: session auth + multi-chain support.
  </text>
</svg>
